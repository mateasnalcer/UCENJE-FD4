    <!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moja Web Stranica</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
    }

    body {
        background: linear-gradient(135deg, #667eea, #764ba2);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
    }

    .container {
        text-align: center;
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(10px);
        padding: 50px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        max-width: 600px;
        width: 90%;
    }

    h1 {
        font-size: 3rem;
        margin-bottom: 20px;
    }

    p {
        font-size: 1.1rem;
        line-height: 1.6;
        margin-bottom: 30px;
    }

    .btn {
        display: inline-block;
        padding: 15px 35px;
        background: white;
        color: #764ba2;
        text-decoration: none;
        border-radius: 50px;
        font-weight: bold;
        transition: 0.3s;
    }

    .btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(255,255,255,0.3);
    }
</style>
</head>

<body>

<div class="container">
    <h1>Dobrodošao 👋</h1>
    <p>
        Ovo je moderna HTML stranica s elegantnim gradijentom,
        staklenim efektom (glassmorphism) i responzivnim dizajnom.
    </p>

    <a href="#" class="btn">Saznaj više</a>
</div>

</body>
</html>

</body>
</html>
